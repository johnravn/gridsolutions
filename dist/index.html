<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/grid-icon-light.svg"
      id="favicon"
    />
    <meta name="theme-color" content="#ffffff" id="theme-color" />
    <meta
      name="description"
      content="Business management for production companies — jobs, crew, inventory, and scheduling."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Grid" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Grid</title>
    <script>
      // Update favicon and theme-color based on theme
      function updateThemeAssets() {
        const favicon = document.getElementById('favicon')
        const themeColorMeta = document.getElementById('theme-color')
        if (!favicon) return

        const htmlElement = document.documentElement
        const isDark = htmlElement.classList.contains('dark')

        favicon.href = isDark ? '/grid-icon-dark.svg' : '/grid-icon-light.svg'

        if (themeColorMeta) {
          themeColorMeta.content = isDark ? '#000000' : '#ffffff'
        }
      }

      updateThemeAssets()

      const observer = new MutationObserver(updateThemeAssets)
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['class'],
      })

      window.addEventListener('storage', (event) => {
        if (event.key === 'theme') {
          updateThemeAssets()
        }
      })
    </script>
    <script type="module" crossorigin src="/assets/index-BixMetIf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Dv8YV8D_.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
